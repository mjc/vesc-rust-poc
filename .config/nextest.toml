[store]
dir = "target/nextest"

[profile.default]
default-filter = 'not test(native_lib_artifacts) and not test(package_pipeline) and not test(fixtures) and not test(hil_loopback_sketch)'

[profile.embedded]
default-filter = 'test(native_lib_artifacts)'

[profile.package]
default-filter = 'test(package_pipeline) or test(fixtures)'

[profile.hil]
default-filter = 'test(hil_loopback_sketch)'
