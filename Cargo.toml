[workspace]
members = [
    "crates/vesc-ffi",
    "crates/vesc-package",
    "crates/vesc-rust-poc",
    "crates/vesc-host-cli",
    "crates/vesc-pkg-build",
    "crates/vesc-protocol",
]
default-members = ["crates/vesc-rust-poc"]
resolver = "2"

[profile.release]
panic = "abort"
lto = true
codegen-units = 1
opt-level = "z"

[profile.dev]
panic = "abort"
