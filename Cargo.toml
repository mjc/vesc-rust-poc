[workspace]
members = [
    "crates/vescpkg-rs-sys",
    "crates/vescpkg-rs-units",
    "crates/vescpkg-rs",
    "crates/vesc-protocol",
    "crates/vescpkg-rs-build",
    "crates/cargo-vescpkg",
    "examples/loopback",
    "examples/snake",
    "examples/refloat",
]
default-members = [
    "crates/cargo-vescpkg",
    "examples/loopback",
    "examples/snake",
]
resolver = "2"

[workspace.lints.rust]
missing_docs = "warn"

[profile.release]
panic = "abort"
lto = true
codegen-units = 1
opt-level = "z"

[profile.dev]
panic = "abort"
