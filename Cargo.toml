[package]
name = "vesc-rust-poc"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["staticlib"]

[dependencies]
vesc-protocol = { path = "vesc-protocol" }

[workspace]
members = [".", "vesc-host-cli", "vesc-pkg-build", "vesc-protocol"]
resolver = "2"

[profile.release]
panic = "abort"
lto = true
codegen-units = 1
opt-level = "z"
