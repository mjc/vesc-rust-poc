[workspace]
members = [
    "crates/vesc-ffi",
    "crates/vesc-sdk",
    "crates/vesc-protocol",
    "crates/vesc-pkg",
    "crates/vesc-cli",
    "examples/loopback",
]
default-members = [
    "crates/vesc-cli",
    "examples/loopback",
]
resolver = "2"

[profile.release]
panic = "abort"
lto = true
codegen-units = 1
opt-level = "z"

[profile.dev]
panic = "abort"
